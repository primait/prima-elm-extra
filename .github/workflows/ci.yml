name: CI

on:
  push:
  workflow_dispatch: {}
  workflow_call: {}

env:
  CI: true

jobs:
  ci:
    name: Run checks and tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ssh-key: ${{ github.ssh-key }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.10.0'

      - name: Install deps
        run: |
          corepack enable
          corepack prepare
          yarn install

      - name: Review
        run: yarn review

      - name: Lint
        run: yarn lint

      - name: Tests
        run: yarn test
